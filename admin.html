// ========== STORAGE ==========
function saveData() {
    localStorage.setItem("sm_users", JSON.stringify(users));
    localStorage.setItem("sm_products", JSON.stringify(products));
    localStorage.setItem("sm_transactions", JSON.stringify(transactions));
    localStorage.setItem("sm_deliveries", JSON.stringify(deliveries));
}

function loadData() {
    let u = localStorage.getItem("sm_users");
    let p = localStorage.getItem("sm_products");
    let t = localStorage.getItem("sm_transactions");
    let d = localStorage.getItem("sm_deliveries");
    if (u) users = JSON.parse(u);
    if (p) products = JSON.parse(p);
    if (t) transactions = JSON.parse(t);
    if (d) deliveries = JSON.parse(d);
}
loadData();

function generateId() { return "TRX" + Date.now() + Math.floor(Math.random() * 10000); }

function showNotif(msg, type = "success") {
    let notifDiv = document.getElementById("notificationContainer");
    if (notifDiv) {
        notifDiv.innerHTML = `<div class="fixed top-20 right-4 z-50 bg-white shadow-lg rounded-lg p-4 fade-in border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'}"><p class="text-sm">${msg}</p></div>`;
        setTimeout(() => { if(notifDiv) notifDiv.innerHTML = ""; }, 3000);
    } else {
        alert(msg);
    }
}

// ========== RENDER MAIN ==========
function render() {
    let app = document.getElementById("app");
    if (!currentUser) {
        renderLanding(app);
    } else {
        if (currentPage === "home") renderHome(app);
        else if (currentPage === "checkout") renderCheckout(app);
        else if (currentPage === "tracking") renderTracking(app);
        else if (currentPage === "profile") renderProfile(app);
        else if (currentPage === "orders") renderMyOrders(app);
        else if (currentPage === "admin" && currentUser.role === "admin") renderAdmin(app);
        else renderHome(app);
    }
}

window.showLoginModal = () => {
    let modal = document.getElementById("loginModal");
    if (modal) { modal.classList.remove("hidden"); modal.classList.add("flex"); }
};
window.closeLoginModal = () => {
    let modal = document.getElementById("loginModal");
    if (modal) { modal.classList.add("hidden"); modal.classList.remove("flex"); }
};
window.doLogin = () => {
    let email = document.getElementById("loginEmail")?.value;
    let pass = document.getElementById("loginPassword")?.value;
    let user = users.find(u => u.email === email && u.password === pass);
    if (user) {
        currentUser = user;
        cart = [];
        closeLoginModal();
        currentPage = "home";
        render();
        showNotif(`Selamat datang, ${user.name}! 🎉`, "success");
    } else { alert("Login gagal! Cek email/password."); }
};

// ========== HOME PAGE ==========

    let filtered = products;
    let subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    let discPercent = currentUser.discount || 0;
    let discount = subtotal * discPercent / 100;
    let total = subtotal - discount;
    
    container.innerHTML = `
        <div id="notificationContainer"></div>
        <div class="bg-white shadow-lg sticky top-0 z-20">
            <div class="container mx-auto px-4 py-3">

                        <h1 class="text-xl font-bold text-purple-600">SekolahMart</h1>
                    </div>
                    <div class="flex items-center gap-3 flex-wrap">
                        <div class="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-full">
                            <span class="text-xl">${currentUser.avatar}</span>
                            <span class="text-sm font-medium">${currentUser.name}</span>

                        </button>
                        <button onclick="goToOrders()" class="bg-gray-100 px-4 py-2 rounded-full text-sm hover:bg-gray-200">📋 Pesanan</button>
                        <button onclick="goToTracking()" class="bg-gray-100 px-4 py-2 rounded-full text-sm hover:bg-gray-200">🚚 Tracking</button>
                        <button onclick="goToProfile()" class="bg-gray-100 px-4 py-2 rounded-full text-sm hover:bg-gray-200">👤 Profil</button>

                        <button onclick="logout()" class="bg-gray-200 px-4 py-2 rounded-full text-sm hover:bg-gray-300">Logout</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-r from-purple-600 to-blue-600 text-white py-2">
            <div class="container mx-auto px-4 text-center text-sm">🏷️ Diskon 20% untuk Member Ustadz! | 🚚 Minimal belanja Rp50.000 gratis ongkir</div>
        </div>
        
        <div class="container mx-auto px-4 py-8">
            <div class="grid lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3">
                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5" id="productGrid">
                        ${filtered.map(p => `
                            <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover">
                                <div class="p-4">
                                    <div class="text-6xl mb-2">${p.image}</div>
                                    <h3 class="font-bold text-lg">${p.name}</h3>
                                    <p class="text-xs text-gray-400">${p.category}</p>
                                    <p class="text-purple-600 font-bold text-xl mt-2">Rp ${p.price.toLocaleString()}</p>
                                    <p class="text-xs text-gray-400">Stok: ${p.stock} | Terjual: ${p.sold}</p>
                                    <button onclick="addToCart(${p.id})" class="mt-3 w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded-lg transition ${p.stock <= 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${p.stock <= 0 ? 'disabled' : ''}>+ Tambah ke Keranjang</button>

                            </div>
                        `).join('')}
                    </div>
                </div>
                <div>
                    <div class="bg-white rounded-xl shadow-lg p-4 sticky top-24">
                        <h3 class="font-bold text-lg mb-3">🛒 Keranjang Saya</h3>
                        <div id="cartSummary" class="max-h-80 overflow-y-auto"></div>
                        <div class="border-t pt-3 mt-3">
                            <p class="flex justify-between text-sm">Subtotal: <span>Rp ${subtotal.toLocaleString()}</span></p>
                            ${discount > 0 ? `<p class="flex justify-between text-sm text-green-600">Diskon Member: <span>-Rp ${discount.toLocaleString()}</span></p>` : ''}

}

function updateCartSummary() {
    let summaryDiv = document.getElementById("cartSummary");
    let badge = document.getElementById("cartBadge");
    if (badge) badge.innerText = cart.reduce((s,i)=>s+i.qty,0);
    if (!summaryDiv) return;
    if (cart.length === 0) {
        summaryDiv.innerHTML = '<div class="text-center py-8"><i class="ri-shopping-cart-line text-5xl text-gray-300"></i><p class="text-gray-400 text-sm mt-2">Keranjang kosong</p></div>';
        return;
    }
    summaryDiv.innerHTML = cart.map(item => `
        <div class="flex justify-between items-center py-2 border-b">
            <div class="flex-1"><p class="font-medium text-sm">${item.name}</p><p class="text-xs text-gray-500">Rp ${item.price.toLocaleString()} x${item.qty}</p></div>
            <div class="flex items-center gap-2">
                <button onclick="updateCartQty(${item.id}, ${item.qty - 1})" class="w-7 h-7 bg-gray-100 rounded-full">-</button>
                <span class="text-sm w-6 text-center">${item.qty}</span>
                <button onclick="updateCartQty(${item.id}, ${item.qty + 1})" class="w-7 h-7 bg-gray-100 rounded-full">+</button>
                <button onclick="removeFromCart(${item.id})" class="text-red-500 ml-1"><i class="ri-delete-bin-line"></i></button>
            </div>
        </div>
    `).join("");
}

window.addToCart = (productId) => {
    let product = products.find(p => p.id === productId);
    if (!product || product.stock <= 0) { showNotif("Stok habis!", "error"); return; }
    let exist = cart.find(c => c.id === productId);
    if (exist) exist.qty++;
    else cart.push({ ...product, qty: 1 });
    updateCartSummary();
    showNotif(`✅ ${product.name} ditambahkan`, "success");
    render();
};

window.updateCartQty = (productId, newQty) => {
    let item = cart.find(c => c.id === productId);
    let product = products.find(p => p.id === productId);
    if (item && product) {
        if (newQty <= 0) cart = cart.filter(c => c.id !== productId);
        else if (newQty <= product.stock) item.qty = newQty;
        else showNotif(`Stok ${product.name} hanya ${product.stock}`, "error");
        updateCartSummary();
        render();
    }
};

window.removeFromCart = (productId) => {
    cart = cart.filter(c => c.id !== productId);
    updateCartSummary();
    render();
};

// ========== CHECKOUT ==========
function renderCheckout(container) {
    let subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    let discPercent = currentUser.discount || 0;
    let discount = subtotal * discPercent / 100;
    let afterDisc = subtotal - discount;
    
    container.innerHTML = `
        <div class="container mx-auto px-4 py-8 max-w-3xl">
            <div id="notificationContainer"></div>
            <button onclick="goBackHome()" class="text-purple-600 mb-4">← Kembali</button>
            <div class="bg-white rounded-2xl shadow-xl p-6">
                <h2 class="text-2xl font-bold mb-4">🧾 Checkout</h2>
                <div class="border-b pb-3 mb-3">
                    ${cart.map(item => `<div class="flex justify-between py-2"><span>${item.name} x${item.qty}</span><span>Rp ${(item.price * item.qty).toLocaleString()}</span></div>`).join('')}
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between"><span>Subtotal</span><span>Rp ${subtotal.toLocaleString()}</span></div>
                    ${discount > 0 ? `<div class="flex justify-between text-green-600"><span>Diskon Member 20%</span><span>-Rp ${discount.toLocaleString()}</span></div>` : ''}
                    <div class="border-t pt-3">
                        <label class="flex items-center justify-between py-2 cursor-pointer"><span>🎫 Booking Antrean <span class="text-red-500">(+Rp2.000)</span></span><input type="checkbox" id="queueFee" class="w-5 h-5"></label>
                        <label class="flex items-center justify-between py-2 cursor-pointer"><span>🚚 Pesan Antar (Delivery)</span><input type="checkbox" id="deliveryOption" class="w-5 h-5"></label>
                        <div id="addressDiv" class="hidden mt-3"><textarea id="addressInput" rows="2" placeholder="Alamat lengkap untuk pengiriman" class="w-full p-3 border rounded-lg"></textarea></div>
                    </div>
                    <div class="border-t pt-3"><div class="flex justify-between font-bold text-xl"><span>Total Bayar:</span><span id="finalTotal" class="text-purple-600">Rp ${afterDisc.toLocaleString()}</span></div>
                    <button onclick="processCheckout()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold mt-4">✅ Konfirmasi & Bayar</button></div>
                </div>
            </div>
        </div>
    `;
    let queueChk = document.getElementById("queueFee");
    let deliveryChk = document.getElementById("deliveryOption");
    let addressDiv = document.getElementById("addressDiv");
    function updateTotal() { let queue = queueChk.checked ? 2000 : 0; document.getElementById("finalTotal").innerHTML = "Rp " + (afterDisc + queue).toLocaleString(); }
    queueChk.onchange = updateTotal;
    deliveryChk.onchange = function() { addressDiv.classList.toggle("hidden", !this.checked); updateTotal(); };
    updateTotal();
}

window.processCheckout = () => {
    if (cart.length === 0) { showNotif("Keranjang kosong!", "error"); return; }
    let subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    let discPercent = currentUser.discount || 0;
    let discount = subtotal * discPercent / 100;
    let afterDisc = subtotal - discount;
    let queueFee = document.getElementById("queueFee")?.checked ? 2000 : 0;
    let isDelivery = document.getElementById("deliveryOption")?.checked || false;
    let address = document.getElementById("addressInput")?.value || "";
    if (isDelivery && !address) { showNotif("Masukkan alamat!", "error"); return; }
    let total = afterDisc + queueFee;
    let trxId = generateId();
    
    transactions.push({ id: trxId, userId: currentUser.id, userName: currentUser.name, items: [...cart], subtotal, discount, queueFee, total, delivery: isDelivery, address, date: new Date().toISOString() });
    cart.forEach(item => { let p = products.find(prod => prod.id === item.id); if (p) { p.stock -= item.qty; p.sold += item.qty; } });
    if (isDelivery) deliveries.push({ trxId, userId: currentUser.id, userName: currentUser.name, status: "Diproses", location: "Toko", address, lastUpdate: new Date().toISOString() });
    saveData();
    showNotif(`✅ Transaksi Berhasil! ID: ${trxId}`, "success");
    alert(`Transaksi Berhasil!\nID: ${trxId}\nTotal: Rp ${total.toLocaleString()}`);
    cart = [];
    currentPage = "home";
    render();
};

// ========== TRACKING, ORDERS, PROFILE ==========
function renderTracking(container) {
    let myDeliveries = deliveries.filter(d => d.userId === currentUser.id);
    container.innerHTML = `<div class="container mx-auto px-4 py-8 max-w-3xl"><button onclick="goBackHome()" class="text-purple-600 mb-4">← Kembali</button><h2 class="text-2xl font-bold mb-4">🚚 Lacak Pengiriman</h2>${myDeliveries.length === 0 ? '<div class="bg-white p-12 text-center rounded-xl"><i class="ri-truck-line text-6xl text-gray-300"></i><p class="text-gray-400">Belum ada pengiriman</p></div>' : myDeliveries.map(d => `<div class="bg-white rounded-xl shadow p-4 mb-4"><p class="font-bold">🔖 ${d.trxId}</p><p>📍 ${d.address}</p><p>Status: <span class="font-bold text-purple-600">${d.status}</span></p><p>Lokasi: ${d.location}</p><p class="text-xs text-gray-400">Update: ${new Date(d.lastUpdate).toLocaleString()}</p></div>`).join('')}</div>`;
}

function renderMyOrders(container) {
    let myOrders = transactions.filter(t => t.userId === currentUser.id).sort((a,b) => new Date(b.date) - new Date(a.date));
    container.innerHTML = `<div class="container mx-auto px-4 py-8 max-w-4xl"><button onclick="goBackHome()" class="text-purple-600 mb-4">← Kembali</button><h2 class="text-2xl font-bold mb-4">📋 Pesanan Saya</h2>${myOrders.length === 0 ? '<div class="bg-white p-12 text-center rounded-xl"><i class="ri-shopping-bag-line text-6xl text-gray-300"></i><p class="text-gray-400">Belum ada pesanan</p></div>' : myOrders.map(order => `<div class="bg-white rounded-xl shadow p-4 mb-4"><div class="flex justify-between"><div><p class="font-bold">🔖 ${order.id}</p><p class="text-xs text-gray-400">${new Date(order.date).toLocaleString()}</p></div><div class="text-right"><p class="font-bold text-purple-600">Rp ${order.total.toLocaleString()}</p><p class="text-xs">${order.delivery ? '🚚 Antar' : '🏪 Ambil'}</p></div></div><div class="border-t mt-2 pt-2">${order.items.map(item => `<div class="flex justify-between text-sm py-1"><span>${item.name} x${item.qty}</span><span>Rp ${(item.price * item.qty).toLocaleString()}</span></div>`).join('')}</div></div>`).join('')}</div>`;
}

function renderProfile(container) {
    let userTrx = transactions.filter(t => t.userId === currentUser.id);
    let totalSpent = userTrx.reduce((s, t) => s + t.total, 0);
    container.innerHTML = `<div class="container mx-auto px-4 py-8 max-w-2xl"><button onclick="goBackHome()" class="text-purple-600 mb-4">← Kembali</button><div class="bg-white rounded-2xl shadow-xl overflow-hidden"><div class="gradient-bg p-6 text-center text-white"><div class="text-7xl mb-2">${currentUser.avatar}</div><h2 class="text-2xl font-bold">${currentUser.name}</h2><p>${currentUser.email}</p></div><div class="p-6"><div class="grid grid-cols-2 gap-4 mb-6"><div class="text-center p-3 bg-gray-50 rounded-lg"><p class="text-2xl font-bold text-purple-600">${userTrx.length}</p><p class="text-xs">Transaksi</p></div><div class="text-center p-3 bg-gray-50 rounded-lg"><p class="text-2xl font-bold text-purple-600">Rp ${totalSpent.toLocaleString()}</p><p class="text-xs">Total Belanja</p></div></div><div class="space-y-3"><div class="flex justify-between py-2 border-b"><span class="text-gray-500">Role</span><span>${currentUser.role === 'admin' ? 'Administrator' : 'Member'}</span></div><div class="flex justify-between py-2 border-b"><span class="text-gray-500">Status</span><span>${currentUser.discount > 0 ? '🏅 Member Ustadz (Diskon 20%)' : 'Member Biasa'}</span></div><div class="flex justify-between py-2 border-b"><span class="text-gray-500">Telepon</span><span>${currentUser.phone || '-'}</span></div></div></div></div></div>`;
}

// ========== ADMIN PANEL (FULL CRUD) ==========

// ========== ADMIN: MANAJEMEN PRODUK (TAMPIL, TAMBAH, EDIT, HAPUS) ==========
function showAdminProducts() {
    adminTab = "products";
    let tabs = ['products', 'orders', 'deliveries', 'members'];
    tabs.forEach(t => {
        let btn = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
        if (btn) { btn.classList.remove('border-purple-600', 'text-purple-600'); btn.classList.add('text-gray-500'); }
    });
    let activeBtn = document.getElementById("tabProducts");
    if (activeBtn) { activeBtn.classList.add('border-purple-600', 'text-purple-600'); activeBtn.classList.remove('text-gray-500'); }
    
    let content = document.getElementById("adminContent");
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h3 class="text-xl font-bold">📦 Manajemen Produk</h3>
                <button onclick="showAddProductModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">+ Tambah Produk Baru</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr><th class="p-3 text-left">No</th><th class="p-3 text-left">Produk</th><th class="p-3 text-left">Kategori</th><th class="p-3 text-right">Harga</th><th class="p-3 text-right">Stok</th><th class="p-3 text-right">Terjual</th><th class="p-3 text-center">Aksi</th></tr>
                    </thead>
                    <tbody>
                        ${products.map((p, index) => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3">${index + 1}</td>
                                <td class="p-3"><span class="text-2xl mr-2">${p.image}</span>${p.name}</td>
                                <td class="p-3">${p.category}</td>
                                <td class="p-3 text-right">Rp ${p.price.toLocaleString()}</td>
                                <td class="p-3 text-right"><span class="${p.stock < 10 ? 'text-red-500 font-bold' : ''}">${p.stock}</span></td>
                                <td class="p-3 text-right">${p.sold}</td>
                                <td class="p-3 text-center">
                                    <button onclick="showEditProductModal(${p.id})" class="text-blue-600 mr-2 hover:text-blue-800"><i class="ri-edit-line"></i> Edit</button>
                                    <button onclick="deleteProductAdmin(${p.id})" class="text-red-600 hover:text-red-800"><i class="ri-delete-bin-line"></i> Hapus</button>
                                 </td>
                             </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="mt-4 p-3 bg-gray-50 rounded-lg text-sm text-gray-500">Total produk: ${products.length} | Total stok: ${products.reduce((s,p)=>s+p.stock,0)}</div>
        </div>
        
        <!-- Modal Tambah Produk -->
        <div id="addProductModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in">
                <h3 class="text-xl font-bold mb-4">+ Tambah Produk Baru</h3>
                <div class="space-y-3">
                    <input type="text" id="newProductName" placeholder="Nama Produk" class="w-full p-3 border rounded-lg">
                    <input type="number" id="newProductPrice" placeholder="Harga (Rp)" class="w-full p-3 border rounded-lg">
                    <input type="number" id="newProductStock" placeholder="Stok" class="w-full p-3 border rounded-lg">
                    <select id="newProductCategory" class="w-full p-3 border rounded-lg">
                        <option value="Alat Tulis">Alat Tulis</option><option value="Perlengkapan">Perlengkapan</option><option value="Jasa">Jasa</option><option value="Pakaian">Pakaian</option>
                    </select>
                    <div class="flex gap-2 mt-4"><button onclick="addProductAdmin()" class="flex-1 bg-green-600 text-white py-2 rounded-lg">Simpan</button><button onclick="closeAddProductModal()" class="flex-1 bg-gray-300 py-2 rounded-lg">Batal</button></div>
                </div>
            </div>
        </div>
        
        <!-- Modal Edit Produk -->
        <div id="editProductModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in">
                <h3 class="text-xl font-bold mb-4">✏️ Edit Produk</h3>
                <input type="hidden" id="editProductId">
                <div class="space-y-3">
                    <input type="text" id="editProductName" placeholder="Nama Produk" class="w-full p-3 border rounded-lg">
                    <input type="number" id="editProductPrice" placeholder="Harga (Rp)" class="w-full p-3 border rounded-lg">
                    <input type="number" id="editProductStock" placeholder="Stok" class="w-full p-3 border rounded-lg">
                    <select id="editProductCategory" class="w-full p-3 border rounded-lg">
                        <option value="Alat Tulis">Alat Tulis</option><option value="Perlengkapan">Perlengkapan</option><option value="Jasa">Jasa</option><option value="Pakaian">Pakaian</option>
                    </select>
                    <div class="flex gap-2 mt-4"><button onclick="updateProductAdmin()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">Update</button><button onclick="closeEditProductModal()" class="flex-1 bg-gray-300 py-2 rounded-lg">Batal</button></div>
                </div>
            </div>
        </div>
    `;
}

window.showAddProductModal = () => {
    let modal = document.getElementById("addProductModal");
    if (modal) { modal.classList.remove("hidden"); modal.classList.add("flex"); }
};
window.closeAddProductModal = () => {
    let modal = document.getElementById("addProductModal");
    if (modal) { modal.classList.add("hidden"); modal.classList.remove("flex"); }
};
window.showEditProductModal = (id) => {
    let product = products.find(p => p.id === id);
    if (product) {
        document.getElementById("editProductId").value = id;
        document.getElementById("editProductName").value = product.name;
        document.getElementById("editProductPrice").value = product.price;
        document.getElementById("editProductStock").value = product.stock;
        document.getElementById("editProductCategory").value = product.category;
        let modal = document.getElementById("editProductModal");
        if (modal) { modal.classList.remove("hidden"); modal.classList.add("flex"); }
    }
};
window.closeEditProductModal = () => {
    let modal = document.getElementById("editProductModal");
    if (modal) { modal.classList.add("hidden"); modal.classList.remove("flex"); }
};

// TAMBAH PRODUK (Admin)
window.addProductAdmin = () => {
    let name = document.getElementById("newProductName")?.value;
    let price = parseInt(document.getElementById("newProductPrice")?.value);
    let stock = parseInt(document.getElementById("newProductStock")?.value);
    let category = document.getElementById("newProductCategory")?.value;
    if (!name || !price || !stock) { alert("Semua field harus diisi!"); return; }
    let newId = Math.max(...products.map(p => p.id), 0) + 1;
    products.push({ id: newId, name, price, stock, category, image: "📦", sold: 0 });
    saveData();
    closeAddProductModal();
    showAdminProducts();
    showNotif(`✅ Produk "${name}" berhasil ditambahkan!`, "success");
};

// EDIT PRODUK (Admin)
window.updateProductAdmin = () => {
    let id = parseInt(document.getElementById("editProductId")?.value);
    let name = document.getElementById("editProductName")?.value;
    let price = parseInt(document.getElementById("editProductPrice")?.value);
    let stock = parseInt(document.getElementById("editProductStock")?.value);
    let category = document.getElementById("editProductCategory")?.value;
    if (!name || !price || !stock) { alert("Semua field harus diisi!"); return; }
    let product = products.find(p => p.id === id);
    if (product) {
        product.name = name;
        product.price = price;
        product.stock = stock;
        product.category = category;
        saveData();
        closeEditProductModal();
        showAdminProducts();
        showNotif(`✅ Produk "${name}" berhasil diupdate!`, "success");
    }
};

// HAPUS PRODUK (Admin)
window.deleteProductAdmin = (id) => {
    let product = products.find(p => p.id === id);
    if (confirm(`Yakin hapus produk "${product?.name}"?`)) {
        products = products.filter(p => p.id !== id);
        saveData();
        showAdminProducts();
        showNotif(`🗑️ Produk "${product?.name}" dihapus!`, "success");
    }
};

    let tabs = ['products', 'orders', 'deliveries', 'members'];
    tabs.forEach(t => {
        let btn = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);

    if (activeBtn) { activeBtn.classList.add('border-purple-600', 'text-purple-600'); activeBtn.classList.remove('text-gray-500'); }
    
    let content = document.getElementById("adminContent");
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-bold mb-4">📋 Semua Pesanan</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100"><tr><th class="p-3 text-left">ID</th><th class="p-3 text-left">Pembeli</th><th class="p-3 text-right">Total</th><th class="p-3 text-left">Tipe</th><th class="p-3 text-left">Tanggal</th></tr></thead>
                    <tbody>${transactions.map(t => `<tr class="border-b"><td class="p-3 text-sm">${t.id}</td><td class="p-3">${t.userName}</td><td class="p-3 text-right font-bold">Rp ${t.total.toLocaleString()}</td><td class="p-3">${t.delivery ? '🚚 Antar' : '🏪 Ambil'}</td><td class="p-3 text-sm">${new Date(t.date).toLocaleDateString()}</td></tr>`).join('')}</tbody>

// ========== ADMIN: PENGIRIMAN ==========
function showAdminDeliveries() {
    let tabs = ['products', 'orders', 'deliveries', 'members'];
    tabs.forEach(t => {
        let btn = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
        if (btn) { btn.classList.remove('border-purple-600', 'text-purple-600'); btn.classList.add('text-gray-500'); }
    });
    let activeBtn = document.getElementById("tabDeliveries");
    if (activeBtn) { activeBtn.classList.add('border-purple-600', 'text-purple-600'); activeBtn.classList.remove('text-gray-500'); }
    
    let content = document.getElementById("adminContent");
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-bold mb-4">🚚 Manajemen Pengiriman</h3>
            ${deliveries.length === 0 ? '<p class="text-gray-400 text-center py-8">Belum ada pengiriman</p>' : deliveries.map(d => `
                <div class="border rounded-lg p-4 mb-3">
                    <div class="flex justify-between items-start flex-wrap gap-2">
                        <div><p class="font-bold">🔖 ${d.trxId}</p><p class="text-sm">Customer: ${d.userName}</p><p class="text-sm">Alamat: ${d.address}</p><p class="text-sm mt-1">Status: <span class="font-semibold text-purple-600">${d.status}</span> | Lokasi: ${d.location}</p></div>
                        <button onclick="updateDeliveryStatusAdmin('${d.trxId}')" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-purple-700">Update Status →</button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

window.updateDeliveryStatusAdmin = (trxId) => {
    let del = deliveries.find(d => d.trxId === trxId);
    if (del) {
        let statuses = ["Diproses", "Dikemas", "Diantar", "Sampai"];
        let locations = ["Toko", "Gudang", "Dalam perjalanan", "Tujuan"];
        let idx = statuses.indexOf(del.status);
        if (idx < statuses.length - 1) {
            del.status = statuses[idx + 1];
            del.location = locations[idx + 1];
        } else {
            del.status = "Sampai";
            del.location = "Tujuan";
        }
        del.lastUpdate = new Date().toISOString();
        saveData();
        showAdminDeliveries();
        showNotif(`Status diperbarui: ${del.status}`, "success");
    }
};

function showAdminMembers() {
    let tabs = ['products', 'orders', 'deliveries', 'members'];
    tabs.forEach(t => {
        let btn = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
        if (btn) { btn.classList.remove('border-purple-600', 'text-purple-600'); btn.classList.add('text-gray-500'); }
    });
    let activeBtn = document.getElementById("tabMembers");
    if (activeBtn) { activeBtn.classList.add('border-purple-600', 'text-purple-600'); activeBtn.classList.remove('text-gray-500'); }
    
    let members = users.filter(u => u.role === 'member');
    let content = document.getElementById("adminContent");
    content.innerHTML = `
        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-bold mb-4">👥 Manajemen Member</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100"><tr><th class="p-3 text-left">Avatar</th><th class="p-3 text-left">Nama</th><th class="p-3 text-left">Email</th><th class="p-3 text-center">Status</th><th class="p-3 text-center">Aksi</th></tr></thead>
                    <tbody>${members.map(m => `<tr class="border-b"><td class="p-3 text-2xl">${m.avatar}</td><td class="p-3">${m.name}</td><td class="p-3">${m.email}</td><td class="p-3 text-center">${m.discount > 0 ? '<span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs">🏅 Member Ustadz (20%)</span>' : '<span class="bg-gray-100 px-2 py-1 rounded-full text-xs">Member Biasa</span>'}</td><td class="p-3 text-center"><button onclick="toggleMemberDiscountAdmin(${m.id})" class="text-blue-600 text-sm">${m.discount > 0 ? 'Cabut Diskon' : 'Beri Diskon'}</button></td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>
    `;
}

window.toggleMemberDiscountAdmin = (userId) => {
    let user = users.find(u => u.id === userId);
    if (user) {
        user.discount = user.discount > 0 ? 0 : 20;
        saveData();
        showAdminMembers();
        showNotif(`Status ${user.name} diperbarui`, "success");
    }
};

// ========== NAVIGATION ==========
window.goBackHome = () => { currentPage = "home"; render(); };
window.goToCheckout = () => { if (cart.length === 0) { showNotif("Keranjang kosong!", "error"); return; } currentPage = "checkout"; render(); };
window.goToTracking = () => { currentPage = "tracking"; render(); };
window.goToProfile = () => { currentPage = "profile"; render(); };
window.goToOrders = () => { currentPage = "orders"; render(); };
window.goToAdmin = () => { currentPage = "admin"; render(); };
window.logout = () => { currentUser = null; cart = []; currentPage = "landing"; render(); showNotif("Anda telah logout", "success"); };

render();
</script>
