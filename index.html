        @keyframes scaleIn {

            100% { background-position: 1000px 0; }

                    <!-- Cart Sidebar -->
                    <div>

                            <h3 class="font-bold text-xl mb-4 flex items-center gap-2">
                                <i class="ri-shopping-cart-line text-pink-500"></i> Keranjang Saya
                            </h3>
                            <div id="cartSummary" class="max-h-96 overflow-y-auto space-y-2"></div>
                            <div class="border-t pt-4 mt-4">
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-gray-500">Subtotal</span>
                                    <span class="font-medium">Rp ${subtotal.toLocaleString()}</span>
                                </div>
                                ${discount > 0 ? `<div class="flex justify-between text-sm mb-2 text-pink-500"><span>Diskon Member 20%</span><span>-Rp ${discount.toLocaleString()}</span></div>` : ''}
                                <div class="flex justify-between font-bold text-lg mt-2 pt-2 border-t">
                                    <span>Total</span>
                                    <span class="gradient-kpop bg-clip-text text-transparent">Rp ${total.toLocaleString()}</span>
                                </div>
                                <button onclick="goToCheckout()" class="w-full btn-kpop text-white py-3 rounded-xl mt-4 font-semibold transition-all">Lanjut Checkout →</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    function updateCartSummaryLocal() {
        let summaryDiv = document.getElementById("cartSummary");
        let badge = document.getElementById("cartBadge");
        if (badge) badge.innerText = cart.reduce((s,i)=>s+i.qty,0);
        if (!summaryDiv) return;
        if (cart.length === 0) {
            summaryDiv.innerHTML = '<div class="text-center py-8"><i class="ri-shopping-cart-line text-5xl text-gray-300"></i><p class="text-gray-400 text-sm mt-2">Keranjang kosong</p><p class="text-xs text-gray-300">Yuk belanja album K-Pop!</p></div>';
            return;
        }
        summaryDiv.innerHTML = cart.map(item => `
            <div class="flex justify-between items-center py-2 border-b">
                <div class="flex-1">
                    <p class="font-medium text-sm">${item.name}</p>
                    <p class="text-xs text-gray-500">Rp ${item.price.toLocaleString()} x${item.qty}</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="updateCartQty(${item.id}, ${item.qty - 1})" class="w-7 h-7 bg-gray-100 rounded-full hover:bg-gray-200">-</button>
                    <span class="text-sm w-6 text-center">${item.qty}</span>
                    <button onclick="updateCartQty(${item.id}, ${item.qty + 1})" class="w-7 h-7 bg-gray-100 rounded-full hover:bg-gray-200">+</button>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 ml-1"><i class="ri-delete-bin-line"></i></button>
                </div>
            </div>
        `).join("");
    }
    
    window.filterGroup = (group) => {
        selectedGroup = group;
        render();
    };
    
    window.addToCart = (productId) => {
        let product = products.find(p => p.id === productId);
        if (!product || product.stock <= 0) { showToast("Stok habis! 😭", "error"); return; }
        let exist = cart.find(c => c.id === productId);
        if (exist) exist.qty++;
        else cart.push({ ...product, qty: 1 });
        updateCartSummaryLocal();
        showToast(`✅ ${product.name} ditambahkan ke keranjang! 💜`, "success");
        render();
    };
    
    window.updateCartQty = (productId, newQty) => {
        let item = cart.find(c => c.id === productId);
        let product = products.find(p => p.id === productId);
        if (item && product) {
            if (newQty <= 0) cart = cart.filter(c => c.id !== productId);
            else if (newQty <= product.stock) item.qty = newQty;
            else showToast(`Stok ${product.name} hanya ${product.stock}`, "error");
            updateCartSummaryLocal();
            render();
        }
    };
    
    window.removeFromCart = (productId) => {
        cart = cart.filter(c => c.id !== productId);
        updateCartSummaryLocal();
        render();
        showToast("Produk dihapus dari keranjang", "success");
    };
    
    updateCartSummaryLocal();
}

                                <input type="checkbox" id="deliveryOption" class="w-5 h-5 accent-pink-500">
                            </label>
                            <div id="addressDiv" class="hidden mt-3">
                                <textarea id="addressInput" rows="2" placeholder="📦 Alamat lengkap untuk pengiriman album K-Pop mu" class="w-full p-3 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none"></textarea>
                            </div>
                        </div>
                        <div class="border-t pt-3 mt-3">
                            <div class="flex justify-between font-bold text-xl">
                                <span>Total Bayar:</span>
                                <span id="finalTotal" class="gradient-kpop bg-clip-text text-transparent">Rp ${afterDisc.toLocaleString()}</span>
                            </div>
                            <button onclick="processCheckout()" class="w-full btn-kpop text-white py-3 rounded-xl font-bold mt-4 transition-all flex items-center justify-center gap-2">
                                <i class="ri-heart-fill"></i> Konfirmasi & Bayar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    let queueChk = document.getElementById("queueFee");
    let deliveryChk = document.getElementById("deliveryOption");
    let addressDiv = document.getElementById("addressDiv");
    let finalSpan = document.getElementById("finalTotal");
    
    function updateTotal() {
        let queue = queueChk.checked ? 2000 : 0;
        let total = afterDisc + queue;
        finalSpan.innerHTML = "Rp " + total.toLocaleString();
    }
    queueChk.onchange = updateTotal;
    deliveryChk.onchange = function() { addressDiv.classList.toggle("hidden", !this.checked); updateTotal(); };
    updateTotal();
}

window.processCheckout = () => {
    if (cart.length === 0) { showToast("Keranjang kosong!", "error"); return; }
    let subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    let discPercent = currentUser.discount || 0;
    let discount = subtotal * discPercent / 100;
    let afterDisc = subtotal - discount;
    let queueFee = document.getElementById("queueFee")?.checked ? 2000 : 0;
    let isDelivery = document.getElementById("deliveryOption")?.checked || false;
    let address = document.getElementById("addressInput")?.value || "";
    if (isDelivery && !address) { showToast("Masukkan alamat pengiriman!", "error"); return; }
    let total = afterDisc + queueFee;
    let trxId = generateId();
    
    transactions.push({ id: trxId, userId: currentUser.id, userName: currentUser.name, items: [...cart], subtotal, discount, queueFee, total, delivery: isDelivery, address, date: new Date().toISOString() });
    cart.forEach(item => { let p = products.find(prod => prod.id === item.id); if (p) { p.stock -= item.qty; p.sold += item.qty; } });
    if (isDelivery) deliveries.push({ trxId, userId: currentUser.id, userName: currentUser.name, status: "Diproses", location: "Gudang KPopShop", address, lastUpdate: new Date().toISOString() });
    saveData();
    showToast(`✅ Transaksi Berhasil! ID: ${trxId} 💜`, "success");
    alert(`🎉 Transaksi Berhasil!\n\nID: ${trxId}\nTotal: Rp ${total.toLocaleString()}\n${isDelivery ? "🚚 Album K-Pop akan segera diantar!\nCek menu Tracking untuk update status." : "🏪 Silakan ambil album di toko KPopShop."}\n\nTerima kasih sudah berbelanja! 💜`);
    cart = [];
    currentPage = "home";
    render();
};

window.updateProductAdmin = () => {
    let id=parseInt(document.getElementById("editId")?.value), name=document.getElementById("editName")?.value, price=parseInt(document.getElementById("editPrice")?.value), stock=parseInt(document.getElementById("editStock")?.value);
    let p=products.find(p=>p.id===id); if(p){p.name=name; p.price=price; p.stock=stock; saveData(); closeEditProductModal(); showAdminProducts(); showToast(`✅ ${name} diupdate!`,"success");}
};
window.deleteProductAdmin = (id) => { if(confirm("Hapus produk?")){products=products.filter(p=>p.id!==id); saveData(); showAdminProducts(); showToast("Produk dihapus","success");} };
function showAdminOrders(){document.getElementById("adminContent").innerHTML=`<div class="bg-white rounded-xl shadow p-6"><h3 class="text-xl font-bold mb-4">📋 Semua Pesanan</h3><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3">ID</th><th>Pembeli</th><th>Total</th><th>Tanggal</th></tr></thead><tbody>${transactions.map(t=>`<tr><td class="p-3">${t.id}</td><td>${t.userName}</td><td>Rp ${t.total.toLocaleString()}</td><td>${new Date(t.date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div></div>`;}
function showAdminDeliveries(){document.getElementById("adminContent").innerHTML=`<div class="bg-white rounded-xl shadow p-6"><h3 class="text-xl font-bold mb-4">🚚 Kelola Pengiriman</h3>${deliveries.map(d=>`<div class="border rounded-lg p-4 mb-3"><div class="flex justify-between"><div><p class="font-bold">🔖 ${d.trxId}</p><p>${d.userName}</p><p>${d.address}</p><p>Status: ${d.status}</p></div><button onclick="updateDeliveryStatusAdmin('${d.trxId}')" class="bg-pink-500 text-white px-4 py-2 rounded-lg">Update Status</button></div></div>`).join('')}</div>`;}
function showAdminMembers(){let members=users.filter(u=>u.role==="member");document.getElementById("adminContent").innerHTML=`<div class="bg-white rounded-xl shadow p-6"><h3 class="text-xl font-bold mb-4">👥 Member Fandom</h3><table class="w-full"><thead><tr><th>Avatar</th><th>Nama</th><th>Email</th><th>Fandom</th><th>Diskon</th><th>Aksi</th></tr></thead><tbody>${members.map(m=>`<tr><td class="text-2xl">${m.avatar}</td><td>${m.name}</td><td>${m.email}</td><td>${m.fandom}</td><td>${m.discount>0?'20%':'0%'}</td><td><button onclick="toggleMemberDiscountAdmin(${m.id})" class="text-blue-500">${m.discount>0?'Cabut':'Beri'} Diskon</button></td></tr>`).join('')}</tbody></table></div>`;}
window.updateDeliveryStatusAdmin=(trxId)=>{let d=deliveries.find(d=>d.trxId===trxId);if(d){let s=["Diproses","Dikemas","Diantar","Sampai"],l=["Gudang","Packing","Dalam perjalanan","Tujuan"],idx=s.indexOf(d.status);if(idx<s.length-1){d.status=s[idx+1];d.location=l[idx+1];}else{d.status="Sampai";d.location="Tujuan";}d.lastUpdate=new Date().toISOString();saveData();showAdminDeliveries();showToast(`Status: ${d.status}`,"success");}};
window.toggleMemberDiscountAdmin=(userId)=>{let u=users.find(u=>u.id===userId);if(u){u.discount=u.discount>0?0:20;saveData();showAdminMembers();showToast(`Diskon ${u.name} ${u.discount>0?'diberikan':'dicabut'}`,"success");}};

// ========== NAVIGATION ==========
window.goBackHome = () => { currentPage = "home"; render(); };
window.goToCheckout = () => { if (cart.length === 0) { showToast("Keranjang kosong!", "error"); return; } currentPage = "checkout"; render(); };
window.goToTracking = () => { currentPage = "tracking"; render(); };
window.goToProfile = () => { currentPage = "profile"; render(); };
window.goToOrders = () => { currentPage = "orders"; render(); };
window.goToAdmin = () => { currentPage = "admin"; render(); };
window.logout = () => { currentUser = null; cart = []; currentPage = "landing"; render(); showToast("Anda telah logout! Sampai jumpa lagi! 💜", "success"); };

render();
</script>
</body>
</html>
